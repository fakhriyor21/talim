<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>INNOLAB EDU — 3D amaliy laboratoriya</title>
  <style>
    :root {
      --teal: #008b9c;
      --navy: #1a4373;
      --orange: #f39200;
      --panel: rgba(13, 28, 48, 0.92);
      --text: #e8eef6;
      --muted: #9aa7b8;
    }
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; overflow: hidden; font-family: "Inter", system-ui, sans-serif; background: #0a121c; color: var(--text); }
    #root { height: 100%; display: flex; flex-direction: column; }
    header {
      flex: 0 0 auto;
      padding: 0.65rem 1rem;
      background: linear-gradient(90deg, var(--navy), color-mix(in oklab, var(--teal) 35%, var(--navy)));
      border-bottom: 2px solid var(--teal);
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    header h1 { font-size: 0.98rem; font-weight: 700; line-height: 1.3; }
    #canvas-wrap { flex: 1; min-height: 0; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    #panel {
      position: absolute; right: 12px; top: 12px; width: min(320px, calc(100% - 24px));
      background: var(--panel); border: 1px solid rgba(0, 139, 156, 0.35); border-radius: 12px;
      padding: 1rem; box-shadow: 0 16px 40px rgba(0,0,0,.45);
    }
    #panel h2 { font-size: 0.82rem; color: var(--teal); margin-bottom: 0.55rem; text-transform: uppercase; letter-spacing: 0.08em; }
    #panel p { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.55rem; line-height: 1.45; }
    .task { display: flex; align-items: flex-start; gap: 0.45rem; font-size: 0.78rem; color: var(--text); margin: 0.35rem 0; }
    .task input { margin-top: 0.15rem; }
    .badge { font-size: 0.65rem; background: var(--orange); color: #1a1208; padding: 0.15rem 0.45rem; border-radius: 4px; font-weight: 700; }
    .hint { margin-top: 0.65rem; border-top: 1px dashed rgba(255,255,255,.12); padding-top: 0.55rem; font-size: 0.72rem; color: var(--muted); }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <header>
      <h1 id="labTitle">3D amaliy laboratoriya</h1>
      <span class="badge" id="moduleName">STEM</span>
    </header>
    <div id="canvas-wrap">
      <div id="panel">
        <h2>Amaliy topshiriq</h2>
        <p id="labDescription">Modelni aylantirib kuzating va parametrlarni tahlil qiling.</p>
        <label for="ctrl" style="display:block;font-size:.72rem;color:var(--muted);margin:.2rem 0;">Parametr</label>
        <input id="ctrl" type="range" min="0" max="100" value="45" style="width:100%;margin:0 0 .45rem;" />
        <p id="metric" style="font-size:.78rem;color:var(--text);margin:.1rem 0 .5rem;">Ko‘rsatkich: 45%</p>
        <div id="tasks"></div>
        <button id="markDone" style="margin-top:.55rem;width:100%;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:linear-gradient(130deg,var(--teal),#1f5f8e);color:#fff;font-weight:700;">Topshiriq bajarildi</button>
        <p class="hint">Har mavzu uchun 3D sahna va topshiriqlar avtomatik moslashtiriladi.</p>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const params = new URLSearchParams(window.location.search);
    const title = params.get("title") || "3D amaliy laboratoriya";
    const moduleName = params.get("module") || "STEM";
    const moduleId = params.get("moduleId") || "";
    const grade = Number(params.get("grade") || "7");
    const accent = params.get("accent") || "#008b9c";

    const labTitle = document.getElementById("labTitle");
    const moduleTag = document.getElementById("moduleName");
    const metricEl = document.getElementById("metric");
    const ctrl = document.getElementById("ctrl");
    const descEl = document.getElementById("labDescription");
    const tasksWrap = document.getElementById("tasks");
    const doneBtn = document.getElementById("markDone");

    labTitle.textContent = title;
    moduleTag.textContent = `${moduleName} · ${grade}-sinf`;
    document.documentElement.style.setProperty("--teal", accent);

    function pickSceneKey(text) {
      const t = text.toLowerCase();
      if (/(tok|elektr|zanjir|magnit|generator|ac|dc)/.test(t)) return "electric";
      if (/(quyosh|shamol|energi|batareya|grid|ges)/.test(t)) return "energy";
      if (/(suv|molekula|kimyo|kislota|reaksiya|eritma|pH)/.test(t)) return "chem";
      if (/(robot|servo|sensor|pid|algoritm|kinematika|plc)/.test(t)) return "robot";
      if (/(agro|tuproq|hosil|sug.or|issiqxona|drone|o.g.it)/.test(t)) return "agro";
      if (/(ai|model|dataset|chatbot|vision|ml)/.test(t)) return "ai";
      return "physics";
    }

    const sceneKey = pickSceneKey(title);
    const TASKS = {
      physics: ["Tezlik/yoki kuchga oid asosiy parametrni o‘zgartiring.", "Modeldagi o‘zgarishni 2 gap bilan izohlang.", "Natijani laboratoriya daftariga yozing."],
      chem: ["Molekula/reaksiya modelidagi struktura elementlarini aniqlang.", "Parametrni o‘zgartirib holat farqini kuzating.", "Tajriba xulosasini yozing va o‘qituvchiga topshiring."],
      robot: ["Robot bo‘g‘im/sensor parametrini sozlang.", "Harakat trayektoriyasini 360° kuzating.", "Qaysi sozlama eng barqaror ekanini belgilang."],
      agro: ["Iqlim/sug‘orish parametrlarini o‘zgartiring.", "Hosildorlik indikatorining o‘zgarishini kuzating.", "Amaliy tavsiya sifatida 1 ta agro yechim yozing."],
      energy: ["Manba quvvati va yo‘qotish parametrlarini solishtiring.", "Qaysi holatda samaradorlik yuqori ekanini toping.", "Energiya balansini qisqa hisobotda yozing."],
      ai: ["Model parametrini o‘zgartirib natijani baholang.", "Xatolik yoki bias sababini tushuntiring.", "Yaxshilash uchun 1 ta tavsiya kiriting."],
      electric: ["Zanjir parametrini o‘zgartiring.", "Tok/kuchlanish farqini kuzating.", "Ohm qonuniga mosligini tekshiring."],
    };
    const tasks = TASKS[sceneKey] || TASKS.physics;
    descEl.textContent = `${moduleName} bo‘yicha "${title}" mavzusi uchun ${grade}-sinfga mos 3D amaliy mashg‘ulot.`;
    tasksWrap.innerHTML = tasks.map((t) => `<label class="task"><input type="checkbox"> ${t}</label>`).join("");
    doneBtn.addEventListener("click", () => {
      doneBtn.textContent = "Bajarildi ✓";
      doneBtn.style.opacity = "0.92";
    });

    const wrap = document.getElementById("canvas-wrap");
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a121c);
    scene.fog = new THREE.Fog(0x0a121c, 6, 35);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 120);
    camera.position.set(2.8, 2.3, 4.1);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    wrap.insertBefore(renderer.domElement, wrap.firstChild);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.6, 0);

    scene.add(new THREE.HemisphereLight(0xa8d4ff, 0x1a2533, 0.94));
    const key = new THREE.DirectionalLight(0xffffff, 1.05);
    key.position.set(4, 7, 4);
    scene.add(key);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(4.2, 64),
      new THREE.MeshStandardMaterial({ color: 0x132032, roughness: 0.88, metalness: 0.06 })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const group = new THREE.Group();
    scene.add(group);
    const moduleColor = new THREE.Color(accent);
    const dynamic = [];

    function addMesh(geo, mat, x, y, z) {
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, y, z);
      group.add(m);
      dynamic.push(m);
      return m;
    }

    if (sceneKey === "chem") {
      addMesh(new THREE.SphereGeometry(0.35, 36, 36), new THREE.MeshStandardMaterial({ color: 0xe95f5f }), 0, 0.9, 0);
      addMesh(new THREE.SphereGeometry(0.2, 28, 28), new THREE.MeshStandardMaterial({ color: 0xdce6f5 }), -0.7, 0.9, 0.45);
      addMesh(new THREE.SphereGeometry(0.2, 28, 28), new THREE.MeshStandardMaterial({ color: 0xdce6f5 }), 0.7, 0.9, 0.45);
    } else if (sceneKey === "robot") {
      addMesh(new THREE.CylinderGeometry(0.34, 0.42, 0.24, 28), new THREE.MeshStandardMaterial({ color: moduleColor }), 0, 0.12, 0);
      const arm = addMesh(new THREE.BoxGeometry(0.2, 1.0, 0.18), new THREE.MeshStandardMaterial({ color: 0x8aa6d7 }), 0, 0.86, 0);
      arm.userData.kind = "arm";
      addMesh(new THREE.BoxGeometry(0.5, 0.14, 0.22), new THREE.MeshStandardMaterial({ color: 0x6f8cc1 }), 0.22, 1.35, 0);
    } else if (sceneKey === "agro") {
      addMesh(new THREE.CylinderGeometry(0.05, 0.07, 0.9, 12), new THREE.MeshStandardMaterial({ color: 0x4caf50 }), 0, 0.45, 0);
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        addMesh(new THREE.SphereGeometry(0.16, 18, 18), new THREE.MeshStandardMaterial({ color: 0x83c767 }), Math.cos(a) * 0.32, 0.8 + (i % 2) * 0.15, Math.sin(a) * 0.32);
      }
    } else if (sceneKey === "energy") {
      const panel = addMesh(new THREE.BoxGeometry(2.0, 0.08, 1.2), new THREE.MeshStandardMaterial({ color: 0x1d2f84, metalness: 0.45, roughness: 0.28 }), 0, 0.72, 0);
      panel.rotation.x = -0.45;
      panel.userData.kind = "panel";
      addMesh(new THREE.CylinderGeometry(0.08, 0.1, 0.7, 12), new THREE.MeshStandardMaterial({ color: 0x607d8b }), 0, 0.34, 0);
    } else if (sceneKey === "ai") {
      const core = addMesh(new THREE.TorusKnotGeometry(0.4, 0.13, 128, 16), new THREE.MeshStandardMaterial({ color: moduleColor }), 0, 1.0, 0);
      core.userData.kind = "core";
      for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2;
        addMesh(new THREE.SphereGeometry(0.08, 14, 14), new THREE.MeshStandardMaterial({ color: 0x8fb4ff }), Math.cos(a) * 1.0, 0.75 + (i % 2) * 0.2, Math.sin(a) * 1.0);
      }
    } else if (sceneKey === "electric") {
      addMesh(new THREE.TorusGeometry(0.5, 0.08, 14, 36), new THREE.MeshStandardMaterial({ color: 0x7fd2ff }), -0.5, 0.9, 0);
      addMesh(new THREE.CylinderGeometry(0.12, 0.12, 0.7, 22), new THREE.MeshStandardMaterial({ color: moduleColor }), 0.5, 0.72, 0);
      addMesh(new THREE.BoxGeometry(0.8, 0.2, 0.26), new THREE.MeshStandardMaterial({ color: 0x8c6fff }), 0, 0.25, 0);
    } else {
      for (let i = 0; i < 12; i++) {
        const size = 0.14 + (i % 4) * 0.05;
        const box = addMesh(
          new THREE.BoxGeometry(size, size, size),
          new THREE.MeshStandardMaterial({ color: moduleColor.clone().offsetHSL((i % 3) * 0.02, 0.05, (i % 4) * 0.03), metalness: 0.3, roughness: 0.45 }),
          Math.cos((i / 12) * Math.PI * 2) * 1.15,
          0.25 + (i % 4) * 0.22,
          Math.sin((i / 12) * Math.PI * 2) * 1.15
        );
        box.userData.kind = "node";
      }
      addMesh(new THREE.TorusKnotGeometry(0.45, 0.14, 128, 16), new THREE.MeshStandardMaterial({ color: moduleColor, metalness: 0.42, roughness: 0.35 }), 0, 0.95, 0);
    }

    const spinFactor = 0.002 + (grade - 7) * 0.00035;
    function onParam(v) {
      const pct = Number(v);
      metricEl.textContent = `Ko‘rsatkich: ${pct}%`;
      dynamic.forEach((m, idx) => {
        const base = 0.86 + pct / 180;
        const add = (idx % 4) * 0.03;
        m.scale.setScalar(base + add);
      });
    }
    ctrl.addEventListener("input", (e) => onParam(e.target.value));
    onParam(ctrl.value);

    function resize() {
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener("resize", resize);
    resize();

    function animate() {
      requestAnimationFrame(animate);
      group.rotation.y += spinFactor;
      dynamic.forEach((m, idx) => {
        m.rotation.x += 0.002 + (idx % 3) * 0.0008;
        m.rotation.y += 0.0025 + (idx % 5) * 0.0006;
      });
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
