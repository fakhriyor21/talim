<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>INNOLAB EDU — amaliy laboratoriya</title>
  <style>
    :root {
      --teal: #008b9c;
      --navy: #1a4373;
      --orange: #f39200;
      --panel: rgba(13, 28, 48, 0.92);
      --text: #e8eef6;
      --muted: #9aa7b8;
    }
    * { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; overflow: hidden; font-family: "Inter", system-ui, sans-serif; background: #0a121c; color: var(--text); }
    #root { height: 100%; display: flex; flex-direction: column; }
    header {
      flex: 0 0 auto;
      padding: 0.65rem 1rem;
      background: linear-gradient(90deg, var(--navy), color-mix(in oklab, var(--teal) 35%, var(--navy)));
      border-bottom: 2px solid var(--teal);
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    header h1 { font-size: 0.98rem; font-weight: 700; line-height: 1.3; }
    #canvas-wrap { flex: 1; min-height: 0; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    #panel {
      position: absolute; right: 12px; top: 12px; width: min(320px, calc(100% - 24px));
      background: var(--panel); border: 1px solid rgba(0, 139, 156, 0.35); border-radius: 12px;
      padding: 1rem; box-shadow: 0 16px 40px rgba(0,0,0,.45);
    }
    #panel h2 { font-size: 0.82rem; color: var(--teal); margin-bottom: 0.55rem; text-transform: uppercase; letter-spacing: 0.08em; }
    #panel p { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.55rem; line-height: 1.45; }
    .task { display: flex; align-items: flex-start; gap: 0.45rem; font-size: 0.78rem; color: var(--text); margin: 0.35rem 0; }
    .task input { margin-top: 0.15rem; }
    .badge { font-size: 0.65rem; background: var(--orange); color: #1a1208; padding: 0.15rem 0.45rem; border-radius: 4px; font-weight: 700; }
    .hint { margin-top: 0.65rem; border-top: 1px dashed rgba(255,255,255,.12); padding-top: 0.55rem; font-size: 0.72rem; color: var(--muted); }
    #handsOnControls label { display: block; font-size: 0.72rem; color: var(--muted); margin: 0.35rem 0 0.1rem; }
    #handsOnControls input[type="range"] { width: 100%; margin-bottom: 0.35rem; }
    #handsOnControls button[type="button"] {
      width: 100%; margin: 0.35rem 0; padding: 0.42rem; font-size: 0.74rem; border-radius: 8px; cursor: pointer;
      border: 1px solid rgba(255,255,255,.22); background: #1a3550; color: #e8eef6; font-weight: 600;
    }
    .circuit-btns { display: flex; flex-wrap: wrap; gap: 6px; margin: 0.45rem 0; }
    .circuit-btns button {
      flex: 1; min-width: 46%; padding: 0.4rem 0.35rem; font-size: 0.72rem; border-radius: 8px; cursor: pointer;
      border: 1px solid rgba(255,255,255,.22); background: #1a3550; color: #e8eef6; font-weight: 600;
    }
    .circuit-btns button.on { background: color-mix(in oklab, var(--teal) 85%, #1a3550); color: #fff; border-color: var(--teal); }
    .circuit-hint { font-size: 0.7rem; color: var(--muted); margin-top: 0.35rem; line-height: 1.4; }
    #handsOnControls select {
      width: 100%; margin-bottom: 0.45rem; padding: 0.38rem 0.45rem; font-size: 0.74rem;
      border-radius: 8px; border: 1px solid rgba(255,255,255,.18); background: #152238; color: var(--text);
    }
    .ctrl-section {
      margin-top: 0.65rem; padding-top: 0.5rem; border-top: 1px solid rgba(0, 139, 156, 0.22);
      font-size: 0.68rem; color: var(--teal); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700;
    }
    #metric {
      padding: 0.45rem 0.55rem; border-radius: 8px;
      background: rgba(0, 25, 45, 0.55); border: 1px solid rgba(0, 139, 156, 0.25);
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="root">
    <header>
      <h1 id="labTitle">Amaliy laboratoriya</h1>
      <span class="badge" id="moduleName">STEM</span>
    </header>
    <div id="canvas-wrap">
      <div id="panel">
        <h2>Tajriba protokoli</h2>
        <p id="labDescription">Laboratoriya stolida jihozlangan tajribani bajaring: o‘lchovlarni o‘qing va xulosani yozing.</p>
        <div id="handsOnControls"></div>
        <label for="ctrl" id="ctrlLabel" style="display:none;">—</label>
        <input id="ctrl" type="range" min="0" max="100" value="45" style="display:none;" aria-hidden="true" />
        <p id="metric" style="font-size:.78rem;color:var(--text);margin:.1rem 0 .5rem;font-family:ui-monospace,monospace;">Asosiy o‘lchov: —</p>
        <div id="tasks"></div>
        <button id="markDone" style="margin-top:.55rem;width:100%;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:linear-gradient(130deg,var(--teal),#1f5f8e);color:#fff;font-weight:700;">Tajribani yakunlash</button>
        <p class="hint" id="simHint">Har bir mashg‘ulotda chapda maxsus boshqaruvlar, stolda 3D jism — slayder, tugma va kerak bo‘lsa kanvasni bosing; protokolni to‘ldiring.</p>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";

    const params = new URLSearchParams(window.location.search);
    const title = params.get("title") || "3D amaliy laboratoriya";
    const moduleName = params.get("module") || "STEM";
    const moduleId = params.get("moduleId") || "";
    const grade = Number(params.get("grade") || "7");
    const labId = params.get("labId") || "";
    const accent = params.get("accent") || "#008b9c";

    const labTitle = document.getElementById("labTitle");
    const moduleTag = document.getElementById("moduleName");
    const metricEl = document.getElementById("metric");
    const ctrl = document.getElementById("ctrl");
    const descEl = document.getElementById("labDescription");
    const tasksWrap = document.getElementById("tasks");
    const doneBtn = document.getElementById("markDone");

    labTitle.textContent = title;
    moduleTag.textContent = `${moduleName} · ${grade}-sinf`;
    document.documentElement.style.setProperty("--teal", accent);

    /** `src/data/labInteractions.ts` bilan sinxron saqlang (fallback URL uchun). */
    function deriveInteraction(text, modId) {
      const raw = (text || "").toLowerCase();
      const n = raw.includes(" · ") ? raw.split(" · ")[0].trim() : raw;
      const RULES = [
        [/rezistor|ketma-ket|parallel|seriya|\bohm\b|elektr\s*zanj|tok\s*zanj|seriya\s*ulash|parallel\s*ulash|qarshilik\s*va\s*reostat|oddiy\s*zanjir|voltmetr|ampermetr|doimiy\s*tok/i, "circuit_resistors"],
        [/boyl|mariott|sharl|ideal\s*gaz|gazlar\s*modeli|molekulyar-kinetik|ideal\s*gaz\s*tenglama/i, "gas_pv_sim"],
        [/prujina|ressora|rezonans|tebranish\s*tenglama|tebranish\s*tajriba|harmonic/i, "spring_oscillator"],
        [/mayatnik|matematik\s*mayatnik|tebranish\s*kirish/i, "pendulum_mechanics"],
        [/issiqlik\s*sig|issiqlik\s*almash|erish|qaynash|bug|termodinamika|issiqlik\s*dvigatel/i, "heat_mix_sim"],
        [/linza|ko‘zgu|sinish|interferensiya|difraksiya|prizma|spektr|yorug‘lik|optik|geometrik\s*optika|to‘lqin\s*optika|polarizatsiya|fotoeffekt/i, "optics_lens_rays"],
        [/elektromagnit|generator|transformator|magnit\s*maydon|kondensator|kulon|elektrostatik|tok\s*kuchi|joule|induksiya|lorens|amper|reaktiv|ac\s*zanjir|elektr\s*zanjir\s*kirish/i, "electric_coil_lab"],
        [/pH|eritma|titr|neytroll|kislota|ishqor|tuzlar|molyar|konsentratsiya/i, "chem_ph_lab"],
        [/molekula|atom|birikma|valent|suvning\s*tarkibi|redoks|gaz\s*ajralish|kimyoviy\s*tenglama/i, "chem_molecule_lab"],
        [/tekis\s*harakat|notekis|impuls|zarbalar|nyuton|ishqalanish|moment|mexanik\s*energiya|qattiq\s*jism|bosim|arximed|zichlik/i, "kinematics_track_lab"],
        [/quyosh|shamol|panel|batareya|invertor|mppt|GES|microgrid|lcoE|pv|turbina/i, "power_renewable_lab"],
        [/servo|motor|sensor|pid|kinematika|arduino|microcontroller|encoder|ros|plc/i, "robot_arm_lab"],
        [/tuproq|sug‘or|issiqxona|hosil|ekin|fotosintez|namlik|o‘g‘it|NDVI/i, "agro_crop_lab"],
        [/machine\s*learning|neural|dataset|accuracy|prompt|chatbot|transformer|nlp|vision|deployment|bias|epoch|model/i, "ai_training_lab"],
      ];
      for (const [re, kind] of RULES) {
        if (re.test(n)) return kind;
      }
      const MOD = { fizika: "pendulum_mechanics", kimyo: "chem_molecule_lab", robot: "robot_arm_lab", agro: "agro_crop_lab", energiya: "power_renewable_lab", ai: "ai_training_lab" };
      return MOD[modId] || "pendulum_mechanics";
    }

    const interactionId = params.get("interaction") || deriveInteraction(title, moduleId);

    const TASKS = {
      pendulum_mechanics: ["L va θ ni o‘zgartiring; impuls bilan mayatnikni hayoting.", "T ni hisoblab 3D bilan solishtiring.", "Xulosa va chizmalar."],
      spring_oscillator: ["k va m ni o‘zgartiring; tebranishni kuzating.", "Davr va chastotani yozing.", "Energiya almashinuvini qisqacha tushuntiring."],
      gas_pv_sim: ["Hajm V ni siljirib P ni kuzating (Boyl–Mariott).", "PV ni turli nuqtalarda yozing.", "Grafik uchun jadval to‘ldiring."],
      heat_mix_sim: ["T₁, T₂ va massalarni o‘rnating; aralashtiring.", "T_yakuniy ni hisoblab tekshiring.", "Issiqlik balansi yozing."],
      optics_lens_rays: ["Linza holatini va n ni o‘zgartiring.", "Nurlar yo‘lini kuzating.", "Formuladan f va d ni solishtiring."],
      kinematics_track_lab: ["Tezlik va vaqtni o‘zgartiring.", "Masofani o‘qing va grafik chizing.", "Harakat tenglamalarini qo‘llang."],
      circuit_resistors: ["R₁, R₂, U ni belgilang; zanjirni ulang.", "Ketma-ket/parallel rejimda o‘lchang.", "R_umum, I, P ni Ohm bilan tekshiring."],
      electric_coil_lab: ["U va R ni o‘zgartiring.", "Tok va katushka aylanishini bog‘lang.", "Joule issiqligini baholang."],
      chem_molecule_lab: ["Harorat va konsentratsiya; atomlarni bosing.", "Bog‘ uzunligi va faollik.", "Protokol va xulosa."],
      chem_ph_lab: ["pH va tomchilatish; indikator rangi.", "Neytrallanishga yaqinlashish.", "Hisob-kitob va xulosa."],
      robot_arm_lab: ["Slayder va stoldagi nuqta.", "Burchak va koordinata yozing.", "Xavfsiz va barqarorlik."],
      agro_crop_lab: ["Sug‘orish/o‘g‘it; meva yig‘ish.", "Hosil dinamikasi.", "Tavsiya."],
      power_renewable_lab: ["Panel va intensivlik.", "Quvvatni turli holatda yozing.", "Samaradorlik."],
      ai_training_lab: ["Epoch va murakkablik.", "Yo‘qotish/aniqlik.", "Overfitting va yechim."],
    };
    const tasks = TASKS[interactionId] || TASKS.pendulum_mechanics;
    descEl.textContent = `${grade}-sinf · ${moduleName} · «${title}» — mavzuga bog‘langan onlayn amaliy laboratoriya.`;
    tasksWrap.innerHTML = tasks.map((t) => `<label class="task"><input type="checkbox"> ${t}</label>`).join("");

    const ctrlLabelEl = document.getElementById("ctrlLabel");
    const simHintEl = document.getElementById("simHint");
    const handsOnEl = document.getElementById("handsOnControls");
    const HANDS_ON_HTML = {
      circuit_resistors: `
        <span class="ctrl-section">Zanjir parametrlari</span>
        <label for="r1">R₁ (Ω)</label>
        <input type="range" id="r1" min="10" max="200" value="60" />
        <label for="r2">R₂ (Ω)</label>
        <input type="range" id="r2" min="10" max="200" value="40" />
        <label for="vbat">Manba U (V)</label>
        <input type="range" id="vbat" min="3" max="24" value="12" />
        <span class="ctrl-section">Rejim va ulash</span>
        <div class="circuit-btns" id="modeBtns">
          <button type="button" data-mode="series">Ketma-ket</button>
          <button type="button" data-mode="parallel">Parallel</button>
          <button type="button" data-mode="open">Uzilgan</button>
          <button type="button" data-mode="pick">Terminaldan ulash</button>
        </div>
        <p class="circuit-hint"><strong>3D laboratoriya:</strong> soyalar va panel — terminallarni juftlab sim ulang.</p>`,
      pendulum_mechanics: `
        <span class="ctrl-section">Mayatnik</span>
        <label for="pendL">Esim uzunligi (sm)</label>
        <input type="range" id="pendL" min="35" max="95" value="65" />
        <label for="pendA0">Boshlang‘ich burchak (°)</label>
        <input type="range" id="pendA0" min="4" max="48" value="16" />
        <label for="pendDamp">Havo qarshiligi</label>
        <input type="range" id="pendDamp" min="50" max="100" value="92" />
        <label for="pendG">Gravitatsiya g (m/s²)</label>
        <input type="range" id="pendG" min="85" max="105" value="98" />
        <button type="button" id="pendKick">Impuls / qayta ishga tushirish</button>
        <p class="circuit-hint"><strong>3D:</strong> metall bob · soyalar · T ≈ 2π√(L/g).</p>`,
      spring_oscillator: `
        <span class="ctrl-section">Garmonik osilator</span>
        <label for="sprK">Prujina qattiqligi k</label>
        <input type="range" id="sprK" min="20" max="160" value="72" />
        <label for="sprM">Yuk massasi m (kg)</label>
        <input type="range" id="sprM" min="2" max="98" value="35" />
        <label for="sprDamp">Sovutish (damping)</label>
        <input type="range" id="sprDamp" min="88" max="100" value="97" />
        <button type="button" id="sprKick">Impuls</button>
        <p class="circuit-hint"><strong>3D:</strong> spiral prujina · ω ≈ √(k/m) · yuk real vaqt rejimida.</p>`,
      gas_pv_sim: `
        <span class="ctrl-section">Ideal gaz</span>
        <label for="gasV">Hajm V (shartli birlik)</label>
        <input type="range" id="gasV" min="15" max="95" value="50" />
        <label for="gasT">Harorat T (K)</label>
        <input type="range" id="gasT" min="250" max="400" value="300" />
        <label for="gasDense">Molekula zichligi (vizual)</label>
        <input type="range" id="gasDense" min="20" max="100" value="72" />
        <p class="circuit-hint"><strong>3D:</strong> molekula buluti · pistons · P ∝ 1/V.</p>`,
      heat_mix_sim: `
        <span class="ctrl-section">Issiqlik almashinuvi</span>
        <label for="heatT1">T₁ (°C)</label>
        <input type="range" id="heatT1" min="10" max="90" value="70" />
        <label for="heatT2">T₂ (°C)</label>
        <input type="range" id="heatT2" min="5" max="85" value="20" />
        <label for="heatM1">Massa m₁ (shartli)</label>
        <input type="range" id="heatM1" min="10" max="90" value="50" />
        <label for="heatGlow">Issiqlik vizual intensivligi</label>
        <input type="range" id="heatGlow" min="15" max="100" value="65" />
        <button type="button" id="heatMixBtn">Aralashtirish</button>
        <p class="circuit-hint"><strong>3D:</strong> ikki globula + aralashma · T_yakuniy.</p>`,
      optics_lens_rays: `
        <span class="ctrl-section">Geometrik optika</span>
        <label for="optMode">Linza turi</label>
        <select id="optMode">
          <option value="conv" selected>Yig‘uvchi (+f)</option>
          <option value="div">Tarqatuvchi (−f)</option>
        </select>
        <label for="optF">Fokal masofa (shartli)</label>
        <input type="range" id="optF" min="15" max="85" value="40" />
        <label for="optU">Buyum masofasi u</label>
        <input type="range" id="optU" min="20" max="95" value="55" />
        <label for="optBright">Nur yorqinligi</label>
        <input type="range" id="optBright" min="25" max="100" value="88" />
        <p class="circuit-hint"><strong>3D:</strong> linza + asosiy va qo‘shimcha nurlar.</p>`,
      kinematics_track_lab: `
        <span class="ctrl-section">Tekis harakat</span>
        <label for="kinV">Tezlik v (m/s, shartli)</label>
        <input type="range" id="kinV" min="5" max="95" value="40" />
        <label for="kinT">Vaqt t (s)</label>
        <input type="range" id="kinT" min="1" max="20" value="5" />
        <label for="kinFric">Ishqalanish (masofa cheklovi)</label>
        <input type="range" id="kinFric" min="0" max="80" value="18" />
        <button type="button" id="kinReset">Holatni qayta boshlash</button>
        <p class="circuit-hint"><strong>3D:</strong> yo‘lak belgilari · s = v·t.</p>`,
      chem_molecule_lab: `
        <span class="ctrl-section">Molekula modeli</span>
        <label for="chemT">Harorat (°C)</label>
        <input type="range" id="chemT" min="5" max="95" value="25" />
        <label for="chemC">Konsentratsiya (%)</label>
        <input type="range" id="chemC" min="5" max="95" value="45" />
        <label for="chemVib">Tebranish tezligi</label>
        <input type="range" id="chemVib" min="20" max="100" value="55" />
        <button type="button" id="chemMix">Aralashtirish</button>
        <p class="circuit-hint"><strong>3D:</strong> atomlar · bog‘ · bosish orqali faollik.</p>`,
      chem_ph_lab: `
        <span class="ctrl-section">pH va eritma</span>
        <label for="phVal">pH (0–14)</label>
        <input type="range" id="phVal" min="0" max="140" value="70" />
        <label for="phVol">Tomchi hajmi</label>
        <input type="range" id="phVol" min="10" max="100" value="45" />
        <label for="phStir">Aralashtirish darajasi</label>
        <input type="range" id="phStir" min="10" max="100" value="40" />
        <button type="button" id="phDrop">Tomchilatish</button>
        <p class="circuit-hint"><strong>3D:</strong> kolba · rang indikatori.</p>`,
      robot_arm_lab: `
        <span class="ctrl-section">Robot manipulyator</span>
        <label for="armAng">Qo‘l burchagi (slayder)</label>
        <input type="range" id="armAng" min="0" max="100" value="42" />
        <label for="armReach">Ish oralig‘i (masshtab)</label>
        <input type="range" id="armReach" min="60" max="130" value="100" />
        <label for="armLed">Maqsat LED yorqinligi</label>
        <input type="range" id="armLed" min="10" max="100" value="72" />
        <p class="circuit-hint"><strong>3D:</strong> stolga bosing — ikki marta boshqaruv.</p>`,
      agro_crop_lab: `
        <span class="ctrl-section">Issiqxona</span>
        <label for="agroW">Sug‘orish (%)</label>
        <input type="range" id="agroW" min="0" max="100" value="48" />
        <label for="agroF">O‘g‘it (%)</label>
        <input type="range" id="agroF" min="0" max="100" value="32" />
        <label for="agroSun">Quyosh / yorug‘lik</label>
        <input type="range" id="agroSun" min="20" max="100" value="75" />
        <p class="circuit-hint"><strong>3D:</strong> tuproq · barglar · meva yig‘ish.</p>`,
      power_renewable_lab: `
        <span class="ctrl-section">Quyosh paneli</span>
        <label for="panTilt">Panel burchagi (°)</label>
        <input type="range" id="panTilt" min="5" max="85" value="38" />
        <label for="sunI">Quyosh intensivligi (%)</label>
        <input type="range" id="sunI" min="15" max="100" value="78" />
        <label for="sunAz">Quyosh azimuti (vizual)</label>
        <input type="range" id="sunAz" min="0" max="100" value="42" />`,
      ai_training_lab: `
        <span class="ctrl-section">Model o‘qitish</span>
        <label for="aiEp">O‘qitish davrlari</label>
        <input type="range" id="aiEp" min="1" max="60" value="14" />
        <label for="aiNz">Model murakkabligi (%)</label>
        <input type="range" id="aiNz" min="15" max="100" value="52" />
        <label for="aiLr">O‘rganish tezligi (vizual)</label>
        <input type="range" id="aiLr" min="10" max="100" value="48" />`,
      electric_coil_lab: `
        <span class="ctrl-section">Elektr va magnit</span>
        <label for="elU">Kuchlanish U (V)</label>
        <input type="range" id="elU" min="3" max="24" value="12" />
        <label for="elR">Reostat R (Ω)</label>
        <input type="range" id="elR" min="8" max="140" value="55" />
        <label for="elGlow">Maydon yorug‘ligi</label>
        <input type="range" id="elGlow" min="15" max="100" value="58" />`,
    };

    handsOnEl.innerHTML = HANDS_ON_HTML[interactionId] || HANDS_ON_HTML.pendulum_mechanics;

    let livePct = 45;
    let pendulumPivot = null;
    let pendulumState = null;
    let robotHitPlane = null;
    let chemPulse = 0;
    let agroHarvest = 0;
    let elULive = 12;
    let elRLive = 55;

    tasksWrap.addEventListener("change", () => {
      simHintEl.textContent =
        "Protokoldagi qadamlarni yakunlaganingizdan keyin «Tajribani yakunlash» tugmasini bosing.";
    });
    doneBtn.addEventListener("click", () => {
      if (labId) {
        const raw = localStorage.getItem("innolab-completed-labs");
        let done = [];
        try {
          done = raw ? JSON.parse(raw) : [];
        } catch {
          done = [];
        }
        if (Array.isArray(done) && !done.includes(labId)) {
          done.push(labId);
          localStorage.setItem("innolab-completed-labs", JSON.stringify(done));
        }
      }
      doneBtn.textContent = "Tajriba qayd etildi ✓";
      doneBtn.style.opacity = "0.92";
      doneBtn.disabled = true;
    });

    function rebuildSpringCoilGeom() {
      if (!springCoilLine || !springMassMesh) return;
      const yTop = 0.075;
      const yBot = springMassMesh.position.y + 0.072;
      const lo = Math.min(yTop, yBot);
      const hi = Math.max(yTop, yBot);
      const pts = [];
      const turns = 10;
      const steps = 56;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const y = hi + (lo - hi) * t;
        const a = t * Math.PI * 2 * turns;
        const r = 0.048;
        pts.push(new THREE.Vector3(Math.cos(a) * r, y, Math.sin(a) * r));
      }
      springCoilLine.geometry.dispose();
      springCoilLine.geometry = new THREE.BufferGeometry().setFromPoints(pts);
    }

    function cylWire(a, b, color, parent) {
      const dir = new THREE.Vector3().subVectors(b, a);
      const len = dir.length();
      if (len < 0.001) return;
      const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(0.012, 0.012, len, 12),
        new THREE.MeshStandardMaterial({ color, metalness: 0.35, roughness: 0.4 })
      );
      mesh.position.copy(mid);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
      parent.add(mesh);
      return mesh;
    }

    function refreshCircuitWires() {
      if (!circuitWireGroup) return;
      while (circuitWireGroup.children.length) {
        const ch = circuitWireGroup.children[0];
        circuitWireGroup.remove(ch);
        ch.geometry?.dispose?.();
        if (ch.material) {
          if (Array.isArray(ch.material)) ch.material.forEach((m) => m.dispose?.());
          else ch.material.dispose?.();
        }
      }
      const colOn = 0xc62828;
      const colOff = 0x455a64;
      const y = 0.128;

      if (circuitMode === "series" || circuitMode === "pick") {
        const sT1 = new THREE.Vector3(-0.22, y, 0);
        const sT2 = new THREE.Vector3(-0.08, y, 0);
        if (circuitWiredSeries) {
          const w = cylWire(sT1, sT2, colOn, circuitWireGroup);
          if (w) {
            w.userData.type = "dynWire";
            if (w.material.emissive) w.material.emissive.set(0x330000);
          }
        }
      } else if (circuitMode === "parallel") {
        const zt = 0.11;
        const pTL = new THREE.Vector3(-0.22, y, zt);
        const pTR = new THREE.Vector3(0.2, y, zt);
        const pBL = new THREE.Vector3(-0.22, y, -zt);
        const pBR = new THREE.Vector3(0.2, y, -zt);
        if (circuitWiredParallel) {
          [cylWire(pTL, pBL, colOn, circuitWireGroup), cylWire(pTR, pBR, colOn, circuitWireGroup)].forEach((w) => {
            if (w) w.userData.type = "dynWire";
          });
        }
      }
    }

    function reqEqAndI() {
      if (circuitMode === "open") return { req: Infinity, i: 0, p: 0 };
      let req = Infinity;
      if (circuitMode === "series" || circuitMode === "pick") {
        if (!circuitWiredSeries) return { req: Infinity, i: 0, p: 0 };
        req = r1Ohm + r2Ohm;
      } else if (circuitMode === "parallel") {
        if (!circuitWiredParallel) return { req: Infinity, i: 0, p: 0 };
        req = (r1Ohm * r2Ohm) / (r1Ohm + r2Ohm);
      }
      if (!Number.isFinite(req) || req <= 0) return { req: Infinity, i: 0, p: 0 };
      const i = vBat / req;
      return { req, i, p: vBat * i };
    }

    function updateCircuitMetric() {
      const { req, i, p } = reqEqAndI();
      const open = circuitMode === "open" || !Number.isFinite(req);
      metricEl.textContent = open
        ? `Zanjir uzilgan · I = 0 A · R_umum = ∞`
        : `R_umum = ${req.toFixed(2)} Ω · I = ${i.toFixed(3)} A · P = ${p.toFixed(2)} W · U = ${vBat.toFixed(1)} V`;
    }

          refreshCircuitWires();

          setActiveBtn();

          circuitSeriesGroup.visible = true;
          circuitParallelGroup.visible = false;
        } else if (m === "parallel") {
          circuitMode = "parallel";

          circuitParallelGroup.visible = true;
        } else if (m === "open") {
          circuitMode = "open";
          circuitWiredSeries = false;
          circuitWiredParallel = false;
          circuitSeriesGroup.visible = true;
          circuitParallelGroup.visible = false;
        }
        refreshCircuitWires();

      /** Raycaster — ketma-ket juft terminallarni bosib sim bilan ulash */
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      let pickSel = null;
      let pickMesh = null;

      renderer.domElement.addEventListener("pointerdown", (ev) => {
        if (interactionId !== "circuit_resistors") return;
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const roots = [];
        if (circuitSeriesGroup.visible) roots.push(circuitSeriesGroup);
        if (circuitParallelGroup.visible) roots.push(circuitParallelGroup);
        const hits = raycaster.intersectObjects(roots, true);
        const term = hits.find((h) => h.object.userData && h.object.userData.isTerminal);
        if (!term) {
          pickSel = null;
          if (pickMesh && pickMesh.material.emissive) pickMesh.material.emissive.set(0x000000);
          pickMesh = null;
          return;
        }

        const id = term.object.userData.termId;
        if (!pickSel) {
          pickSel = id;
          pickMesh = term.object;
          if (pickMesh.material.emissive) pickMesh.material.emissive.set(0x553300);
          return;
        }
        if (pickSel === id) {
          if (pickMesh && pickMesh.material.emissive) pickMesh.material.emissive.set(0x000000);
          pickSel = null;
          pickMesh = null;
          return;
        }

        if (circuitSeriesGroup.visible && ((pickSel === "s1" && id === "s2") || (pickSel === "s2" && id === "s1"))) {
          circuitMode = "series";
          circuitWiredSeries = true;
          circuitPickWire = false;
        }
        if (
          circuitParallelGroup.visible &&
          ((pickSel === "pTL" && id === "pBL") ||
            (pickSel === "pBL" && id === "pTL") ||
            (pickSel === "pTR" && id === "pBR") ||
            (pickSel === "pBR" && id === "pTR"))
        ) {
          circuitWiredParallel = true;
        }

        circuitTerminals.forEach((t) => {
          if (t.material.emissive) t.material.emissive.set(0x000000);
        });
        pickSel = null;
        pickMesh = null;
        refreshCircuitWires();
        updateCircuitMetric();
      });
    }

          aiCoreMesh.userData.lrMul = 0.75 + lr / 200;
          const loss = Math.max(0.04, 1.06 - ep / 65);
          metricEl.textContent = `AI · epoch ${ep} · yo‘qotish ${(loss * 100).toFixed(1)}% · LR ${lr}% · aniqlik ${Math.min(97, 46 + nz * 0.48).toFixed(0)}%`;
        };
        aiEp.addEventListener("input", applyAi);
        aiNz.addEventListener("input", applyAi);
        aiLr.addEventListener("input", applyAi);
        applyAi();
      }

      if (interactionId === "electric_coil_lab" && electricCoil) {
        const elU = document.getElementById("elU");
        const elR = document.getElementById("elR");
        const elGlow = document.getElementById("elGlow");
        const applyEl = () => {
          elULive = Number(elU.value);
          elRLive = Number(elR.value);
          const I = elULive / elRLive;
          livePct = elRLive;
          const g = Number(elGlow.value) / 100;
          metricEl.textContent = `Elektr · U = ${elULive} V · R = ${elRLive} Ω · I = ${I.toFixed(3)} A · maydon ${elGlow.value}%`;
          electricCoil.userData.spinBoost = I * 0.22;
          electricCoil.material.emissive.set(0x5599ff);
          electricCoil.material.emissiveIntensity = g * 0.55 + I * 0.08;
          if (electricResistor) electricResistor.scale.set(1, 0.48 + elRLive / 190, 1);
        };
        elU.addEventListener("input", applyEl);
        elR.addEventListener("input", applyEl);
        elGlow.addEventListener("input", applyEl);
        applyEl();
      }

      attachInteractiveRaycaster();
    }

    function attachInteractiveRaycaster() {
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();

      renderer.domElement.addEventListener("pointerdown", (ev) => {
        if (interactionId === "circuit_resistors") return;
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);

        if (interactionId === "chem_molecule_lab" || interactionId === "chem_ph_lab") {
          const hits = raycaster.intersectObjects(group.children, true);
          const atom = hits.find((h) => h.object.userData && h.object.userData.chemPick);
          if (atom) chemPulse = 1;
          return;
        }

        if (interactionId === "robot_arm_lab" && robotHitPlane && armPivot) {
          const h = raycaster.intersectObject(robotHitPlane);
          if (h.length) {
            const pt = h[0].point;
            const ang = THREE.MathUtils.clamp(Math.atan2(pt.x, pt.z + 0.05) * 0.95 - 0.35, -1.05, 1.05);
            armPivot.rotation.z = ang;
            const armAng = document.getElementById("armAng");
            if (armAng) armAng.value = String(Math.round(((ang + 0.88) / 1.76) * 100));
            metricEl.textContent = `Robot · maqsad (${pt.x.toFixed(2)}, ${pt.z.toFixed(2)}) · θ ≈ ${((ang * 180) / Math.PI).toFixed(1)}°`;
          }
          return;
        }

        if (interactionId === "agro_crop_lab") {
          const hits = raycaster.intersectObjects(group.children, true);
          const fr = hits.find((x) => x.object.userData && x.object.userData.agroPick);
          if (fr) {
            agroHarvest += 1;
            fr.object.scale.multiplyScalar(0.72);
            const agroW = document.getElementById("agroW");
            const agroF = document.getElementById("agroF");
            const w = agroW ? Number(agroW.value) : 50;
            const f = agroF ? Number(agroF.value) : 30;
            metricEl.textContent = `Agro · sug‘orish ${w}% · o‘g‘it ${f}% · yig‘ilgan meva ${agroHarvest}`;
          }
        }
      });
    }

    setupHandsOnBindings();

    function resize() {
      const w = wrap.clientWidth;
      const h = wrap.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener("resize", resize);
    resize();

    function animate() {
      requestAnimationFrame(animate);
      clock.t += 0.016;
      const t = clock.t;

      if (interactionId === "circuit_resistors") {
        group.rotation.y += spinFactor * 0.35;
        group.position.y = benchTop;
        controls.update();
        renderer.render(scene, camera);
        return;
      }

      if (pendulumPivot && pendulumState && interactionId !== "spring_oscillator") {
        const dt = 0.016;
        const alpha = -(gravG / Math.max(0.15, pendulumState.L)) * Math.sin(pendulumState.theta);
        pendulumState.omega += alpha * dt;
        pendulumState.theta += pendulumState.omega * dt;
        pendulumState.omega *= pendDrag;
        pendulumPivot.rotation.z = pendulumState.theta;
      }

      if (interactionId === "spring_oscillator" && springState && springMassMesh) {
        const dt = 0.016;
        const a = -(springState.k / Math.max(0.05, springState.m)) * springState.x;
        springState.v += a * dt;
        springState.x += springState.v * dt;
        springState.v *= springDampMul;
        springMassMesh.position.y = springState.restY + springState.x;
        rebuildSpringCoilGeom();
      }

      if (interactionId === "gas_pv_sim" && gasParticleGeo && gasParticleVel) {
        const pos = gasParticleGeo.attributes.position.array;
        const vel = gasParticleVel;
        const n = pos.length / 3;
        const vigor = (gasSim.t / 320) * (gasSim.v / 72 + 0.35);
        for (let i = 0; i < n; i++) {
          const ix = i * 3;
          vel[ix] += (Math.random() - 0.5) * 0.0012 * vigor;
          vel[ix + 1] += (Math.random() - 0.5) * 0.001 * vigor;
          vel[ix + 2] += (Math.random() - 0.5) * 0.0012 * vigor;
          pos[ix] += vel[ix];
          pos[ix + 1] += vel[ix + 1];
          pos[ix + 2] += vel[ix + 2];
          const rx = pos[ix];
          const ry = pos[ix + 1];
          const rz = pos[ix + 2];
          const rh = Math.sqrt(rx * rx + rz * rz);
          if (rh > 0.185 || ry > 0.37 || ry < 0.025) {
            const th = Math.random() * Math.PI * 2;
            const rr = 0.165 * Math.sqrt(Math.random());
            pos[ix] = Math.cos(th) * rr;
            pos[ix + 1] = 0.035 + Math.random() * 0.29;
            pos[ix + 2] = Math.sin(th) * rr;
            vel[ix] *= 0.25;
            vel[ix + 1] *= 0.25;
            vel[ix + 2] *= 0.25;
          }
        }
        gasParticleGeo.attributes.position.needsUpdate = true;
      }

      if (
        (interactionId === "chem_molecule_lab" || interactionId === "chem_ph_lab") &&
        chemCore &&
        chemCore.material &&
        chemPulse > 0.008
      ) {
        if (!chemCore.material.emissive) chemCore.material.emissive = new THREE.Color(0x000000);
        chemCore.material.emissive.set(0xff5500);
        chemCore.material.emissiveIntensity = chemPulse * 0.85;
        chemPulse *= 0.9;
      } else if (
        (interactionId === "chem_molecule_lab" || interactionId === "chem_ph_lab") &&
        chemCore &&
        chemCore.material &&
        chemCore.material.emissive
      ) {
        chemCore.material.emissiveIntensity *= 0.88;
        if (chemCore.material.emissiveIntensity < 0.02) chemCore.material.emissiveIntensity = 0;
      }

      group.rotation.y += spinFactor * (interactionId === "electric_coil_lab" ? 0.45 : pendulumPivot ? 0.28 : 1);

      group.position.y = benchTop;

      if (electricCoil) {
        const boost = electricCoil.userData.spinBoost ?? 0.06;
        electricCoil.rotation.x += 0.014 + boost;
        electricCoil.rotation.y += 0.009 + boost * 0.45;
      }

      dynamic.forEach((m, idx) => {
        if (interactionId === "robot_arm_lab") return;
        const k = m.userData.kind;
        if (k === "coil" || k === "panel" || k === "core") return;
        if (k === "chemCore") {
          m.rotation.y += 0.009;
          return;
        }
        if (k === "fruit") {
          m.rotation.y += 0.004 + (idx % 3) * 0.0006;
          return;
        }
        if (k === "resistor") {
          m.rotation.y += 0.003;
          return;
        }
        m.rotation.x += 0.0018 + (idx % 3) * 0.0007;
        m.rotation.y += 0.0022 + (idx % 5) * 0.00055;
      });

      if (aiCoreMesh) {
        const lr = aiCoreMesh.userData.lrMul ?? 1;
        aiCoreMesh.rotation.x += (0.006 + livePct / 8500) * lr;
        aiCoreMesh.rotation.y += (0.011 + livePct / 5500) * lr;
      }

      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
